apiVersion: batch/v1
kind: Job
metadata:
  name: extension-installed
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: data-test
        env:
          - name: EXT_SQL_NAME
            value: ($values.sql_name)
          - name: DB_URI
            valueFrom:
              secretKeyRef:
                name: (join('-', [$values.name, 'app']))
                key: uri
        image: alpine/psql:latest
        command: ['sh', '-c']
        args:
         - |
           set -e
           DB_URI=$(echo $DB_URI | sed "s|/\*|/|")
           test "$(psql "$DB_URI" -tAc "SELECT EXISTS (SELECT FROM pg_catalog.pg_extension WHERE extname = '${EXT_SQL_NAME}')" -q)" = "t"
           test "$(psql "$DB_URI" -tAc "SELECT EXISTS (SELECT 1 FROM pg_type WHERE typname = 'mol')" -q)" = "t"
           test "$(psql "$DB_URI" -tAc "SELECT mol_from_smiles('c1ccccc1') IS NOT NULL" -q)" = "t"
           echo "Extension '${EXT_SQL_NAME}' is installed and rdkit functions work!"
